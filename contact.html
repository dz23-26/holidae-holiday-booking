<!DOCTYPE html>

<head>

</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Holidae</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="hamburger">☰</div>
        </nav>
    </header>

    <section class="featured">
        <h2>Get in Touch</h2>
        <form id="contactForm" style="max-width:600px; margin:2rem auto;">
            <label>Name:</label><br>
            <input type="text" id="name" required style="width:100%; padding:10px; margin-bottom:1rem;"><br>
            <label>Email:</label><br>
            <input type="email" id="email" required style="width:100%; padding:10px; margin-bottom:1rem;"><br>
            <label>Message:</label><br>
            <textarea id="message" rows="5" style="width:100%; padding:10px; margin-bottom:1rem;"></textarea><br>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>
